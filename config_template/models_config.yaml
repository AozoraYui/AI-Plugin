# AI 插件模型供应商配置
# 每个供应商包含以下字段：
#   id: 供应商标识（唯一）
#   name: 供应商显示名称
#   base_url: API 基础地址
#   api_key: API 密钥
#   model_groups: 模型组配置
#     flash: Flash 模型组（用于 #chat, #draw 等指令）
#     pro: Pro 模型组（用于 #prochat 指令）
#     ultra: Ultra 模型组（用于 #ultrachat, #ultradraw 指令）
#   每个模型组包含：
#     chat_models: 对话模型列表
#     draw_models: 绘图模型列表

- id: "your-provider-id"
  name: "供应商名称"
  base_url: "https://api.example.com/v1"
  api_key: "your-api-key-here"
  model_groups:
    # Flash 组: 用于 #chat, #draw 等指令
    flash:
      chat_models:
        - "gemini-2.5-flash"
      draw_models:
        - "gemini-2.5-flash-image"

    # Pro 组: 用于 #prochat 指令
    pro:
      chat_models:
        - "gemini-2.5-pro"
      draw_models: []

    # Ultra 组: 用于 #ultrachat, #ultradraw 等指令
    ultra:
      chat_models:
        - "gemini-3-pro"
      draw_models: []
