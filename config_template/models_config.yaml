# ================================================================
# AI 插件模型供应商配置
# ----------------------------------------------------------------
# 本文件为多文档 YAML，用 "---" 分隔为若干段落：
#   1) 供应商列表（模型来源）
#   2) 指令自定义
#   3) 图文转述 Vision Relay
#   4) 联网搜索 / 网页抓取 / 文件读取 / Shell / 天气 等开关
# ----------------------------------------------------------------
# 每个供应商字段说明：
#   id          供应商唯一标识（被 intent_model / vision_model 引用）
#   name        显示名称（用于 #ai模型列表 等展示）
#   priority    优先级，数字越小越优先（默认 1）
#               同优先级内按模型得分（成功率 + 延迟）自动排序
#               高优先级组全部失败后自动降级到下一优先级
#               例：priority 1 主力，priority 2 备用
#   multimodal  是否支持识图（默认 true）
#               false 表示纯文本模型，遇图片时自动走 Vision Relay
#   base_url    API 基础地址（仅到 /v1，结尾不要带斜杠或多余空格）
#   api_key     API 密钥
#   per_call_models  （可选）按次扣费模型名单
#               列在此处的模型视为「每次请求固定计费」，调度时尽量避开：
#               同优先级内，按量计费模型只要没全部熔断就优先使用，
#               按量模型全挂了才降级到按次模型。名单按模型名精确匹配。
#               不同中转站的按次模型名各异，按各自实际名称填写即可。
#   model_groups 模型组，分 flash / pro / ultra 三档：
#               flash  默认组    → #chat / #draw
#               pro    专业组    → #pchat / #pdraw
#               ultra  旗舰组    → #uchat / #udraw
#               （指令前缀随 CHAT_COMMAND / DRAW_COMMAND 变化）
#     每组含：
#       chat_models  对话模型列表（同优先级、同计费档内按得分排序）
#       draw_models  绘图模型列表（不支持绘图填 [] 即可）
#       直接填模型名字符串，插件自动适配 chat / images 端点
# ================================================================

- id: "your-provider-id"
  name: "供应商名称"
  priority: 1
  multimodal: true
  base_url: "https://api.example.com/v1"
  api_key: "your-api-key-here"
  # per_call_models:           # 可选：该站按次扣费的模型名（调度时尽量避开）
  #   - "c-gemini-2.5-flash"
  model_groups:
    flash:
      chat_models:
        - "gemini-2.5-flash"
      draw_models:
        - "gemini-2.5-flash-image"

    pro:
      chat_models:
        - "gemini-2.5-pro"
      draw_models: []

    ultra:
      chat_models:
        - "gemini-3-pro"
      draw_models: []

---
# ================================================
# 指令自定义（可选，不配置则使用默认值）
# CHAT_COMMAND: 对话指令关键词（默认 chat）
#   例: 设为 "c" 后 → #c 默认 / #pc 专业 / #uc 旗舰 / #sc 单次
# DRAW_COMMAND: 绘图指令关键词（默认 draw）
#   例: 设为 "d" 后 → #d 默认 / #pd 专业 / #ud 旗舰
# 临时 flag 可叠加在前缀后：n 联网 / w 网页抓取 / f 文件读取 / v 图文转述
#   例: #cn 临时联网、#cf 临时文件读取
# 注意：请勿使用与绘图预设（如 cos化、手办化）冲突的关键词
# ================================================
# CHAT_COMMAND: chat
# DRAW_COMMAND: draw

---
# ================================================
# 图文转述（Vision Relay）配置
# 当主模型不支持多模态（无法识图）时，启用此功能后，
# 插件会先用 Vision 模型描述图片，再将描述文本喂给主模型。
# 适用于纯文本模型间接"看图"。
# 默认关闭，可使用 #cv 临时强制启用图文转述
#
# vision_model: 支持配置多个 Vision 模型，按顺序依次尝试
#   单模型（兼容旧格式）:
#     vision_model:
#       provider_id: "xxx"
#       model_id: "gemini-2.5-flash"
#   多模型:
#     vision_model:
#       - provider_id: "xxx"
#         model_id: "gemini-2.5-flash"
#       - provider_id: "yyy"
#         model_id: "gemini-3-flash"
# ================================================
enable_vision_relay: false

vision_model:
  provider_id: "your-provider-id"
  model_id: "gemini-2.5-flash"

---
# ================================================
# 联网搜索配置
# enable_web_search: 是否启用联网搜索功能（默认 false，使用 #cn 临时启用）
# intent_model: 搜索意图分析专用模型（支持多模型故障转移）
#   如果不配置 intent_model，则使用 Flash 模型组做意图分析
#   配置独立模型可大幅加快分析速度，推荐使用轻量模型
#   注意：intent_model 必须与 enable_web_search 平级（不要缩进！）
#   例:
#   intent_model:
#     - provider_id: "provider1"
#       model_id: "gemini-2.5-flash"
#     - provider_id: "provider2"
#       model_id: "qwen-turbo"
# ================================================
enable_web_search: false
# intent_model: []

# ================================================
# 网页抓取配置
# enable_web_fetch: 是否启用网页抓取（默认 false，使用 #cw 临时启用）
#   启用后，所有包含 URL 的对话会自动抓取网页内容
#   注意：与 enable_web_search 平级（不要缩进！）
# ================================================
enable_web_fetch: false

# ================================================
# 本地文件读取与 Shell 工具配置
# ------------------------------------------------
# enable_file_read: 是否启用本地文件读取（默认 false）
#   仅主人可用；启用后 AI 自动识别文件/目录读取意图并调用只读工具
#   临时启用：#cf / #scf
#   非主人即使显式索要本地文件，也会被直接拒绝
#
# enable_shell_exec: 是否允许 AI 执行服务器 Shell 命令（默认 false）
#   ⚠ 高危能力：等同把服务器命令行交给 AI，请慎重开启
#   仅主人可用；非主人无论如何都无法触发
#   独立开关：无需再开 enable_file_read，开启后自动具备文件读取能力
#   支持多轮补查：AI 可根据上一条命令结果决定下一步命令
#
# 以下为可调上限（注释即用默认值，单位见名）：
#   SHELL_EXEC_TIMEOUT_MS            单条命令默认超时（默认 60000）
#   SHELL_EXEC_MAX_TIMEOUT_MS        单条命令超时上限（默认 240000）
#   SHELL_EXEC_MAX_OUTPUT_CHARS      单页输出截断字符数（默认 24000，超长按游标分页不丢数据）
#   SHELL_EXEC_FOLLOWUP_MAX_ROUNDS   多轮补查最大轮数（默认 5，含大数据翻页续读）
#   SHELL_EXEC_FOLLOWUP_CONTEXT_CHARS 补查时回传给模型的上下文字符数（默认 24000）
#
# enable_file_transfer: 是否启用文件收发（默认 false）
#   仅主人可用；开启后 AI 可按意图：
#     · 上传：把白名单目录内的文件/文件夹发送到当前会话（文件夹自动打包为 tar.gz）
#     · 下载：把当前消息或引用消息里的图片/视频/语音/文件保存到白名单目录
#   路径同样受 file_roots.yaml 白名单约束，与文件读取一致
#   非主人无论如何都无法触发
#
# enable_ai_draw: 是否启用 AI 对话联动画图（默认 false）
#   开启后所有人都可在对话中用自然语言让 AI 画图（等同调用 #draw）
#   支持参考图（带图/引用图/@成员头像）与预设风格名识别
#   生成的图片由工具直接发送到会话
#
# enable_group_admin: 是否启用群管理（默认 false）
#   开启后，群聊中「主人」或「当前群的管理员/群主」可用自然语言让 AI 执行：
#   禁言/解禁、全员禁言、踢人、改群名片、设专属头衔、精华消息、入群审核（通过/拒绝加群申请）
#   前提：机器人本身需为该群管理员（设头衔需群主）；入群申请由插件自动记录 1 小时供审核
#
# show_thinking: 是否显示 AI 思考过程（Raw 模式；false 时自动清洗思考内容，默认 false）
# show_thinking_notice: 是否在普通对话请求模型前发送“xx思考中”占位提示（默认 false）
# draw_review_after_generate: 画图成功后是否把生成图再交给 AI 看一眼，并基于图片说一句短评（默认 false，会额外消耗一次多模态输入）
# 注意：以上开关均与 enable_web_search 平级（不要缩进！）
# ================================================
# enable_file_read: false
# enable_shell_exec: false
# enable_file_transfer: false
# enable_ai_draw: false
# enable_group_admin: false
# show_thinking: false
# show_thinking_notice: false
# draw_review_after_generate: false
# SHELL_EXEC_TIMEOUT_MS: 60000
# SHELL_EXEC_MAX_TIMEOUT_MS: 240000
# SHELL_EXEC_MAX_OUTPUT_CHARS: 24000
# SHELL_EXEC_FOLLOWUP_MAX_ROUNDS: 5
# SHELL_EXEC_FOLLOWUP_CONTEXT_CHARS: 24000

# ================================================
# 天气查询配置
# weather_api_key: 高德地图 API Key（用于天气查询工具）
#   获取方式：https://lbs.amap.com/ 注册后创建应用获取
#   不配置则天气查询功能不可用
# ================================================
# weather_api_key: ''

# ================================================
# 天气查询（国际降级）配置
# openweathermap_api_key: OpenWeatherMap API Key
#   高德查不到时自动降级使用，支持国际城市
#   获取方式：https://openweathermap.org/api 注册后获取免费 Key
#   不配置则仅使用高德
# ================================================
# openweathermap_api_key: ''
