# AI 插件模型供应商配置
# 每个供应商包含以下字段：
#   id: 供应商标识（唯一）
#   name: 供应商显示名称
#   priority: 优先级（数字越小越优先，默认1）
#             同优先级内按模型得分（成功率+延迟）排序
#             高优先级组全部失败后自动降级到下一组
#             例：priority 1 为主力，priority 2 为备用
#   multimodal: 是否为多模态（支持识图），默认 true
#             设为 false 表示纯文本模型，有图片时会自动启用 Vision Relay
#   base_url: API 基础地址
#   api_key: API 密钥
#   model_groups: 模型组配置
#     flash: Flash 模型组（用于 #chat, #draw 等指令）
#     pro: Pro 模型组（用于 #prochat 指令）
#     ultra: Ultra 模型组（用于 #ultrachat, #ultradraw 指令）
#   每个模型组包含：
#     chat_models: 对话模型列表
#     draw_models: 绘图模型列表

- id: "your-provider-id"
  name: "供应商名称"
  priority: 1
  base_url: "https://api.example.com/v1"
  api_key: "your-api-key-here"
  model_groups:
    flash:
      chat_models:
        - "gemini-2.5-flash"
      draw_models:
        - "gemini-2.5-flash-image"

    pro:
      chat_models:
        - "gemini-2.5-pro"
      draw_models: []

    ultra:
      chat_models:
        - "gemini-3-pro"
      draw_models: []

---
# ================================================
# 指令自定义（可选，不配置则使用默认值）
# CHAT_COMMAND: 对话指令关键词（默认 chat）
#   例: 设为 "c" 后 → #c, #pc, #uc, #sc
# DRAW_COMMAND: 绘图指令关键词（默认 draw）
#   例: 设为 "d" 后 → #d, #pd, #ud
# 注意：请勿使用与预设指令冲突的关键词
# ================================================
# CHAT_COMMAND: chat
# DRAW_COMMAND: draw

---
# ================================================
# 图文转述（Vision Relay）配置
# 当主模型不支持多模态（无法识图）时，启用此功能后，
# 插件会先用 Vision 模型描述图片，再将描述文本喂给主模型。
# 适用于纯文本模型间接"看图"。
# 默认关闭，可使用 #cv 临时强制启用图文转述
#
# vision_model: 支持配置多个 Vision 模型，按顺序依次尝试
#   单模型（兼容旧格式）:
#     vision_model:
#       provider_id: "xxx"
#       model_id: "gemini-2.5-flash"
#   多模型:
#     vision_model:
#       - provider_id: "xxx"
#         model_id: "gemini-2.5-flash"
#       - provider_id: "yyy"
#         model_id: "gemini-3-flash"
# ================================================
enable_vision_relay: false

vision_model:
  provider_id: "your-provider-id"
  model_id: "gemini-2.5-flash"

---
# ================================================
# 联网搜索配置
# enable_web_search: 是否启用联网搜索功能（默认 false，使用 #cn 临时启用）
# intent_model: 搜索意图分析专用模型（支持多模型故障转移）
#   如果不配置 intent_model，则使用 Flash 模型组做意图分析
#   配置独立模型可大幅加快分析速度，推荐使用轻量模型
#   注意：intent_model 必须与 enable_web_search 平级（不要缩进！）
#   例:
#   intent_model:
#     - provider_id: "provider1"
#       model_id: "gemini-2.5-flash"
#     - provider_id: "provider2"
#       model_id: "qwen-turbo"
# ================================================
enable_web_search: false
# intent_model: []

# ================================================
# 网页抓取配置
# enable_web_fetch: 是否启用网页抓取（默认 false，使用 #cw 临时启用）
#   启用后，所有包含 URL 的对话会自动抓取网页内容
#   注意：与 enable_web_search 平级（不要缩进！）
# ================================================
enable_web_fetch: false
