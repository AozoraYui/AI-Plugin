- command: 手办化5
  name: 游戏截图风格手办
  prompt: Realistic PVC figure based on the game screenshot character, exact pose
    replication highly detailed textures PVC material with subtle sheen and
    smooth paint finish, placed on an indoor wooden computer desk (with subtle
    desk items like a figure box/mouse), illuminated by soft indoor light (mix
    of desk lamp and natural window light) for realistic shadows and highlights,
    macro photography style,high resolution,sharp focus on the figure,shallow
    depth of field (desk background slightly blurred but visible), no
    stylization,true-to-reference color and design, 1:1scale.

- command: 手办化6
  name: 高端收藏级手办
  prompt: Create a premium, collectible 1/7 scale standalone figurine based on the
    image, meticulously replicating the character, made from smooth PVC and ABS
    plastic with a professional matte finish. It stands on a minimalist
    transparent acrylic base. Next to it is its retail packaging box displaying
    the price and brand information, with the figure wrapped in plastic inside
    the slightly larger box. They are naturally arranged on a clean wooden table
    surrounded by reference books, with a bookshelf in the background and soft
    afternoon sunlight streaming through the window. Photo-realistic, DSLR
    effect, depth of field, bokeh background.

- command: Q版化
  name: 粘土人/Q版风格
  prompt: "((chibi style)), ((super-deformed)), ((head-to-body ratio 1:2)), ((huge
    head, tiny body)), ((smooth rounded limbs)), ((soft balloon-like hands and
    feet)), ((plump cheeks)), ((childlike big eyes)), ((simplified facial
    features)), ((smooth matte skin, no pores)), ((soft pastel color palette)),
    ((gentle ambient lighting, natural shadows)), ((same facial expression, same
    pose, same background scene)), ((seamless integration with original
    environment, correct perspective and scale)), ((no outline or thin soft
    outline)), ((high resolution, sharp focus, 8k, ultra-detailed)), avoid:
    realistic proportions, long limbs, sharp edges, harsh lighting, wrinkles,
    blemishes, thick black outlines, low resolution, blurry, extra limbs,
    distorted face"

- command: cos化
  aliases:
    - cosplay化
    - COS化
  name: 真人Cosplay
  prompt: Generate a highly detailed photo of a real-life girl cosplaying this
    illustration, at Comiket. Exactly replicate the same pose, body posture,
    hand gestures, facial expression, and camera framing as in the original
    illustration. Keep the same angle, perspective, and composition, without any
    deviation.