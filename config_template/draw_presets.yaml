# AI 作图预设配置
# 每个预设包含以下字段：
#   command: 指令名称（用户通过 #指令 直接触发，如 #手办化、#Q版化 等）
#   name: 预设显示名称
#   prompt: 作图提示词（英文效果更佳）
#   aliases: 可选，指令别名列表
#
# 💡 模型组切换：在指令前加前缀切换模型组
#   #手办化   → Flash 模型组（默认）
#   #p手办化  → Pro 模型组
#   #u手办化  → Ultra 模型组

- command: 手办化
  name: 强制全身手办化V1 (动物可用)
  prompt: "Please accurately transform the main subject in this photo into a
    realistic, masterpiece-like 1/7 scale PVC statue. Behind this statue, a
    packaging box should be placed: the box has a large clear front window on
    its front side, and is printed with subject artwork, product name, brand
    logo, barcode, as well as a small specifications or authenticity
    verification panel. A small price tag sticker must also be attached to one
    corner of the box. Meanwhile, a computer monitor is placed at the back, and
    the monitor screen needs to display the ZBrush modeling process of this
    statue. In front of the packaging box, this statue should be placed on a
    round plastic base. The statue must have 3D dimensionality and a sense of
    realism, and the texture of the PVC material needs to be clearly
    represented. If the background can be set as an indoor scene, the effect
    will be even better. Below are detailed guidelines to note: When repairing
    any missing parts, there must be no poorly executed elements. When repairing
    human figures (if applicable), the body parts must be natural, movements
    must be coordinated, and the proportions of all parts must be reasonable. If
    the original photo is not a full-body shot, try to supplement the statue to
    make it a full-body version. The human figure's expression and movements
    must be exactly consistent with those in the photo. The figure's head should
    not appear too large, its legs should not appear too short, and the figure
    should not look stunted—this guideline may be ignored if the statue is a
    chibi-style design. For animal statues, the realism and level of detail of
    the fur should be reduced to make it more like a statue rather than the real
    original creature. No outer outline lines should be present, and the statue
    must not be flat. Please pay attention to the perspective relationship of
    near objects appearing larger and far objects smaller."

- command: 手办化2
  name: 商业化人物形象手办
  prompt: Use the nano-banana model to create a 1/7 scale commercialized figure of
    thecharacter in the illustration, in a realistic styie and environment.Place
    the figure on a computer desk, using a circular transparent acrylic
    basewithout any text.On the computer screen, display the ZBrush modeling
    process of the figure.Next to the computer screen, place a BANDAl-style toy
    packaging box printedwith the original artwork.

- command: 手办化3
  name: 写实人像手办
  prompt: "Your primary mission is to accurately convert the subject from the
    user's photo into a photorealistic, masterpiece quality, 1/7 scale PVC
    figurine, presented in its commercial packaging. **Crucial First Step:
    Analyze the image to identify the subject's key attributes (e.g., human
    male, human female, animal, specific creature) and defining features (hair
    style, clothing, expression). The generated figurine must strictly adhere to
    these identified attributes.** This is a mandatory instruction to avoid
    generating a generic female figure. **Top Priority - Character Likeness:**
    The figurine's face MUST maintain a strong likeness to the original
    character. Your task is to translate the 2D facial features into a 3D
    sculpt, preserving the identity, expression, and core characteristics. If
    the source is blurry, interpret the features to create a sharp, well-defined
    version that is clearly recognizable as the same character. **Scene
    Details:**  1. **Figurine:** The figure version of the photo I gave you,
    with a clear representation of PVC material, placed on a round plastic base.
    2. **Packaging:** Behind the figure, there should be a partially transparent
    plastic and paper box, with the character from the photo printed on it. 3.
    **Environment:** The entire scene should be in an indoor setting with good
    lighting."

