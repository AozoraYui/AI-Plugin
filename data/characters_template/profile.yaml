# 角色参考图库模板
# 使用方法：复制本文件到 data/characters/{角色ID}/profile.yaml，并把参考图放在同一目录下。
# 支持图片格式：.png / .jpg / .jpeg / .webp / .gif
# 示例目录：
# data/characters/yuuka/
#   profile.yaml
#   0.png
#   1.webp

# 角色显示名，会写入画图提示词和日志
name: 角色名

# 角色别名。用户说出其中任意一个时，都可以命中该角色。
aliases:
  - 角色名
  - 角色别名
  - character_id

# 角色外貌/服饰/气质/画风设定。
# 建议写清楚发型发色、瞳色、光环/标志物、服装、常见道具、整体气质。
description: |
  在这里填写角色设定。
  例如：某作品中的某角色，发型发色、瞳色、标志性装饰、服装、气质、常用道具等。
  画图时，工具会把本目录随机挑选的参考图放在最前，并把这段文字作为角色设定一起提交给绘图模型。
